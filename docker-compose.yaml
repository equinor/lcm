services:
  nginx:
    restart: unless-stopped
    build: ./nginx
    ports:
      - "80:8080"
    depends_on:
      - web
      - oauth2-proxy

  redis:
    build: ./redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: 'very secret'
  oauth2-proxy:
    build: ./oauth2
    depends_on:
      redis:
        condition: service_healthy
    environment:
      OAUTH2_PROXY_REDIS_PASSWORD: 'very secret'
      OAUTH2_PROXY_COOKIE_SECRET: 'vry secure cokie' #  cookie_secret must be 16, 24, or 32 bytes
      OAUTH_CLIENT_ID: "1dbc1e96-268d-41ad-894a-92a9fb85f954"
      OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/callback
      CLIENT_SECRET_FILE: /run/secrets/client_secret
    secrets: 
      - client_secret
  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      FLASK_DEBUG: "true"
      TABLE_KEY: ${TABLE_KEY}
      APPINSIGHTS_CON_STRING: ${APPINSIGHTS_CON_STRING}
    volumes:
      - ./api/src:/app/src

  web:
    build:
      context: ./web
      target: development
      args:
        APPINSIGHTS_CON_STRING: ${APPINSIGHTS_CON_STRING}
    restart: unless-stopped
    stdin_open: true
    environment:
      HMR_CLIENT_PORT: ${HMR_CLIENT_PORT:-}
      USE_POLLING: ${USE_POLLING:-false}
    volumes:
      - ./web/src:/code/src
secrets:
  client_secret:
    file: ./secrets/client_secret.txt
    